<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativo de Hoteles - Roomly</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container-fluid">
    <header>
        <a href="index.html"><img src="img/logo_icon.png" alt="Roomly Logo" class="logo"></a>
        <nav>
            <a id="backToTripLink" href="#"><i class="fas fa-arrow-left"></i> Volver al Viaje</a>
        </nav>
    </header>

    <div class="card">
        <h2 id="tripTitle">Cargando viaje...</h2>
        <p id="tripDetails" style="color: var(--text-light-color); margin-top: 0.5rem;"></p>
    </div>

    <div class="comparative-view">
        <aside id="filters-sidebar" class="card">
            <div class="section-header" style="margin-bottom: 0.5rem; padding-bottom: 0.5rem;">
                <h3><i class="fas fa-filter"></i> Filtros de Criterios</h3>
            </div>
            <p style="font-size: 0.9rem; margin-bottom: 1.5rem;">Activa o desactiva criterios para recalcular el ranking en tiempo real.</p>
            <div id="criteria-filters">
                <p>Cargando criterios...</p>
            </div>
            <div style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; text-align: center;">
                <button id="btnSaveChanges" class="btn-primary" style="width: 100%;"><i class="fas fa-save"></i> Guardar Cambios</button>
                <p style="font-size: 0.8rem; color: var(--text-light-color); margin-top: 0.5rem;">Guarda los pesos y criterios activos en la configuración principal del viaje.</p>
            </div>
        </aside>

        <main id="ranking-main">
            <div class="card">
                <div class="section-header">
                    <h2><i class="fas fa-trophy"></i> Ranking de Hoteles</h2>
                    <button id="btnShowDetailedView" class="btn-secondary" title="Ver tabla detallada">
                        <i class="fas fa-table"></i> Ver Tabla Detallada
                    </button>
                </div>
                <div id="hotelsList" class="hotel-ranking">
                    <p>Cargando hoteles...</p>
                </div>
                <div id="detailedTableContainer" style="display: none;">
                    <!-- Detailed table will be rendered here -->
                </div>
                <div id="chartContainer" style="display: none;">
                    <!-- Chart will be rendered here -->
                </div>
            </div>
        </main>
    </div>

</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/comparativo.js"></script>

</body>
</html>
