<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomly - Mis Viajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <header>
        <a href="index.html"><img src="img/logo_icon.png" alt="Roomly Logo" class="logo"></a>
    </header>

    <!-- Contenedor para crear nuevo viaje -->
    <div id="createTripCard" class="card" style="display: none;">
        <h2>Crear Nuevo Viaje</h2>
        <form id="createTripForm">
            <div class="input-group">
                <label for="tripName">Nombre del Viaje</label>
                <input type="text" id="tripName" placeholder="Ej: Verano en la Toscana" required>
            </div>
            <div class="input-group">
                <label for="tripCity">Ciudad (País)</label>
                <input type="text" id="tripCity" placeholder="Ej: Florencia (Italia)" required>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="tripStartDate">Fecha de Inicio</label>
                    <input type="date" id="tripStartDate" required>
                </div>
                <div class="input-group">
                    <label for="tripEndDate">Fecha de Fin</label>
                    <input type="date" id="tripEndDate" required>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="tripRooms">Nº de Habitaciones</label>
                    <input type="number" id="tripRooms" placeholder="Ej: 2" min="1" required>
                </div>
                <div class="input-group">
                    <label for="tripPeople">Nº de Personas</label>
                    <input type="number" id="tripPeople" placeholder="Ej: 4" min="1" required>
                </div>
            </div>
            <div class="input-group">
                <label for="tripThemeColor">Color del Viaje</label>
                <input type="color" id="tripThemeColor" value="#014464" style="height: 40px; padding: 5px; width: 100px; border-radius: 8px;">
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-plus"></i> Crear Viaje</button>
        </form>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Seleccionar Viaje</h2>
            <button id="showCreateTripBtn" class="btn-secondary"><i class="fas fa-plus"></i> Nuevo Viaje</button>
        </div>
        <div id="tripsList">
            <p>Cargando Viajes...</p>
            <!-- Los viajes se cargarán aquí dinámicamente -->
        </div>
    </div>
</div>

<!-- Modal para Editar Viaje -->
<div id="editTripModal" class="modal-overlay" style="display: none;">
    <div class="modal-content card">
        <div class="modal-header">
            <h3>Editar Viaje</h3>
            <button id="cancelEditTrip" class="close-button">&times;</button>
        </div>
        <form id="editTripForm">
            <div class="input-group">
                <label for="editTripName">Nombre del Viaje</label>
                <input type="text" id="editTripName" required>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="editTripStartDate">Fecha de Inicio</label>
                    <input type="date" id="editTripStartDate" required>
                </div>
                <div class="input-group">
                    <label for="editTripEndDate">Fecha de Fin</label>
                    <input type="date" id="editTripEndDate" required>
                </div>
            </div>
            <div class="input-group">
                <label for="editTripPeople">Nº de Personas</label>
                <input type="number" id="editTripPeople" min="1" required>
            </div>
            <button type="submit" class="btn-primary">Guardar Cambios</button>
        </form>
    </div>
</div>

<!-- Scripts de Firebase y de la aplicación -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/mis-viajes.js"></script>

</body>
</html>
