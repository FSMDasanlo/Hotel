<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomly - Gestionar Características</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <header>
        <a href="index.html"><img src="img/logo_icon.png" alt="Roomly Logo" class="logo"></a>
        <nav>
            <a href="index.html">Viajes</a>
            <a href="caracteristicas.html" class="active">Características</a>
        </nav>
    </header>

    <!-- Contenedor para crear nueva característica -->
    <div class="card">
        <h2>Añadir Nueva Característica</h2>
        <form id="createCharacteristicForm">
            <div class="form-row">
                <div class="input-group">
                    <label for="charName">Nombre de la Característica</label>
                    <input type="text" id="charName" placeholder="Ej: Calidad del desayuno" required>
                </div>
                <div class="input-group">
                    <label for="charCategory">Categoría</label>
                    <input type="text" id="charCategory" placeholder="Ej: Gastronomía" required>
                </div>
            </div>
            <button type="submit" class="btn-secondary"><i class="fas fa-plus"></i> Añadir Característica</button>
        </form>
    </div>

    <div class="card">
        <div class="section-header">
            <h2>Listado de Características</h2>
        </div>
        <div id="characteristicsGrid" class="characteristics-grid">
             <!-- Las tarjetas se cargarán aquí dinámicamente -->
        </div>
    </div>
</div>

<!-- Scripts de Firebase y de la aplicación -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/caracteristicas.js"></script>

</body>
</html>
